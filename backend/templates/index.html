<!DOCTYPE html>
<html>
<head>
    <title>My Blog Platform</title>
</head>
<body>

    <h1>My Blog Platform 🚀</h1>

    <h2>Add New Post</h2>

    <form method="POST">

        Title:<br>
        <input type="text" name="title"><br><br>

        Author:<br>
        <input type="text" name="author"><br><br>

        Category:<br>
        <input type="text" name="category"><br><br>

        Content:<br>
        <textarea name="content"></textarea><br><br>

        <button type="submit">Publish</button>

    </form>

    <hr>

    <h2>All Posts</h2>

{% for post in posts %}

<div style="border:1px solid #ddd; padding:15px; margin:10px 0; border-radius:8px; background:white;">

    <h3>{{ post[1] }}</h3>

    <p><b>Author:</b> {{ post[2] }}</p>
    <p><b>Category:</b> {{ post[3] }}</p>

    <a href="/delete/{{ post[0] }}" style="color:red;">
        Delete Post
    </a>
    <a href="/delete/{{ post[0] }}">Delete Post</a>
<a href="/edit/{{ post[0] }}" style="color:blue; margin-left:10px;">Edit Post</a>

</div>

{% endfor %}

</body>
</html>
